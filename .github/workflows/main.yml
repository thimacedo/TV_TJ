name: Website Screen Stream 24/7

on:
  schedule:
    - cron: '0 */5 * * *'
  workflow_dispatch:

jobs:
  stream-screen:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg xvfb libgbm1 libasound2

      - name: Install Puppeteer
        run: npm install puppeteer

      - name: Start Stream with Virtual Display
        env:
          RTMP_URL: "rtmp://a.rtmp.youtube.com/live2"
          STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          # 1. Inicia o Xvfb (Display Virtual)
          Xvfb :99 -screen 0 1280x720x24 &
          export DISPLAY=:99

          # 2. Inicia o Navegador em background
          node capture.js &
          sleep 10 # Aguarda o carregamento do site

          # 3. FFmpeg captura o Display :99 (X11grab)
          ffmpeg -f x11grab -video_size 1280x720 -framerate 30 -i :99.0 \
          -f pulse -i default -c:v libx264 -preset superfast \
          -pix_fmt yuv420p -maxrate 3000k -bufsize 6000k -g 60 \
          -c:a aac -b:a 128k -f flv "$RTMP_URL/$STREAM_KEY"
name: Continuous 24/7 Live Stream

on:
  schedule:
    - cron: '0 */5 * * *' # Reinicia a cada 5 horas para evitar timeout de 6h
  workflow_dispatch: # Permite início manual

jobs:
  streaming:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Start Streaming
        run: |
  ffmpeg -v debug -re -stream_loop -1 -i "$SOURCE_URL" \
  -c:v libx264 -preset superfast -b:v 4000k -maxrate 4000k -bufsize 8000k \
  -pix_fmt yuv420p -g 60 -c:a aac -b:a 128k -ar 44100 \
  -f flv "$RTMP_URL/$STREAM_KEY"
